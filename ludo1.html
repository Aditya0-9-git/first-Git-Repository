<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Board</title>
<link rel="stylesheet" href="ludo.css">
</head>

<body>

<div class="board">

    <!-- BLUE -->
    <div class="home blue">
        <div class="box">
            <div class="coin"></div>
            <div class="coin"></div>
            <div class="coin"></div>
            <div class="coin"></div>
        </div>
    </div>

    <!-- TOP PATH -->
    <div class="path vertical">
        <div></div><div></div><div></div>
        <div></div><div class="red"></div><div class="red"></div>
        <div></div><div class="red"></div><div></div>
        <div></div><div class="red"></div><div></div>
        <div></div><div class="red"></div><div></div>
        <div></div><div class="red"></div><div></div>
    </div>

    <!-- RED -->
    <div class="home red">
        <div class="box">
            <div class="coin"></div>
            <div class="coin"></div>
            <div class="coin"></div>
            <div class="coin"></div>
        </div>
    </div>

    <!-- LEFT PATH -->
    <div class="path horizontal">
        <div></div><div class="blue"></div><div></div>
        <div></div><div></div><div></div>
        <div></div><div class="blue"></div><div class="blue"></div>
        <div class="blue"></div><div class="blue"></div><div class="blue"></div>
        <div></div><div></div><div></div>
    </div>

    <!-- CENTER -->
    <div class="center"></div>

    <!-- RIGHT PATH -->
    <div class="path horizontal">
        <div></div><div></div><div></div>
        <div class="green"></div><div class="green"></div><div class="green"></div>
        <div class="green"></div><div class="green"></div><div></div>
        <div></div><div></div><div class="green"></div>
        <div></div><div></div><div></div>
    </div>

    <!-- YELLOW -->
    <div class="home yellow">
        <div class="box">
            <div class="coin"></div>
            <div class="coin"></div>
            <div class="coin"></div>
            <div class="coin"></div>
        </div>
    </div>

    <!-- BOTTOM PATH -->
    <div class="path vertical">
        <div></div><div class="yellow"></div><div></div>
        <div></div><div class="yellow"></div><div></div>
        <div></div><div class="yellow"></div><div></div>
        <div></div><div class="yellow"></div><div></div>
        <div class="yellow"></div><div class="yellow"></div><div></div>
    </div>

    <!-- GREEN -->
    <div class="home green">
        <div class="box">
            <div class="coin"></div>
            <div class="coin"></div>
            <div class="coin"></div>
            <div class="coin"></div>
        </div>
    </div>

</div>

</body>
</html>
