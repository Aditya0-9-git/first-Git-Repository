<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            max-width: 0;
        }
        #grand-parent {
            height: 500px;
            width: 1000px;
            border: 2px solid black;
            padding: 50px;
            

        }
        #parent {
            height: 400px;
            width: 800px;
            background-color:red ;
            padding: 50px;
        }
        #child{
            height: 300px;
            width: 500px;
            background-color: brown;
            
        }
        #smaller-child{
            height: 100px;
            width: 200px;
            background-color: pink;
            position: absolute;
            top: 0px;


        }
        body{
            padding: 50px;
        }
    </style>
</head>
<body>
    <div id="grand-parent">
        <div id="parent">
        <div id="child">
            <div id="smaller-child">

            </div>
            </div>
        </div>
    </div>
    
</body>
</html>
