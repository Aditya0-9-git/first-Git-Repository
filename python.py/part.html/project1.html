<!DOCTYPE html>
<html>
<head>
  <title>Layout Design</title>
  <link rel="stylesheet" href="project1.css">
</head>
<body>

<div class="container">

  <!-- Left Section -->
  <div class="left">
    <div class="box small"></div>
    <div class="box small"></div>
    <div class="box circle"></div>
    <div class="box two"></div>
  </div>

  <!-- Center Section -->
  <div class="center">
    <div class="square outer">
      <div class="square inner1">
        <div class="square inner2">
          <div class="circle center-circle"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Middle Right -->
  <div class="middle">
    <div class="vertical"></div>
  </div>

  <!-- Right Section -->
  <div class="right">
    <div class="top">
      <div class="small"></div>
      <div class="big"></div>
      <div class="circle"></div>
    </div>
    <div class="mid">
      <div class="small"></div>
      <div class="small"></div>
      <div class="small"></div>
      <div class="square"></div>
      <div class="circle"></div>
    </div>
    <div class="bottom">
      <div class="small"></div>
      <div class="big"></div>
      <div class="big"></div>
    </div>
  </div>

</div>

</body>
</html>
